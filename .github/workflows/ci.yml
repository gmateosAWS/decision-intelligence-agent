name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Unit tests + linting (every push / PR) ─────────────────────────
  test:
    name: Unit tests + linting
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install --no-deps -r requirements-dev.lock

      - name: black format check
        run: black --check .

      - name: ruff lint
        run: ruff check .

      - name: mypy type check
        run: |
          mypy --ignore-missing-imports --no-strict-optional \
               --warn-return-any --warn-unused-configs \
               --explicit-package-bases \
               agents/ api/ spec/ system/ simulation/ optimization/ \
               config/ db/ memory/ evaluation/ prompts/ core/

      - name: Strict mypy on agents/ (L1 dim 17)
        run: mypy --config-file=mypy-agents-strict.ini --explicit-package-bases agents/

      - name: Memory boundary lint (item 5.11)
        run: python scripts/check_memory_boundary.py

      - name: Unit tests with coverage
        run: pytest -m "not integration" --tb=short -q --cov=. --cov-report=term-missing

      - name: pip-audit security scan
        run: pip-audit --strict --desc
        continue-on-error: true
        env:
          # Dummy keys so import-time provider checks don't raise.
          # No real LLM calls are made — unit tests mock all LLM interactions.
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'sk-test-placeholder' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || 'sk-ant-test-placeholder' }}

  # ── Job 2: Integration tests with Postgres (PR to main only) ──────────────
  # NOTE: This job requires OPENAI_API_KEY and ANTHROPIC_API_KEY as GitHub Secrets.
  # These are injected at runtime, never committed to code.
  # PRs from external forks will skip this job.
  integration:
    name: Integration tests (Postgres)
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: llull_test
          POSTGRES_USER: llull
          POSTGRES_PASSWORD: llull
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://llull:llull@localhost:5432/llull_test
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'sk-test-placeholder' }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || 'sk-ant-test-placeholder' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install --no-deps -r requirements-dev.lock

      - name: Run database migrations
        run: alembic upgrade head

      - name: Generate training data
        run: python data/generate_data.py

      - name: Train demand model
        run: python models/train_demand_model.py

      - name: Build knowledge index
        # Requires OPENAI_API_KEY secret (repo Settings → Secrets → Actions).
        run: python knowledge/build_index.py

      - name: Integration tests
        run: pytest -m integration --tb=short -q
