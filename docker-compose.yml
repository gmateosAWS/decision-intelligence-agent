services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: llull
      POSTGRES_USER: llull
      POSTGRES_PASSWORD: llull
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U llull"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://llull:llull@postgres:5432/llull
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
