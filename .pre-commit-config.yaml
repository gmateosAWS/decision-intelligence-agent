repos:
  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        name: mypy --strict (agents/)
        args: [--config-file=mypy-agents-strict.ini, --explicit-package-bases]
        files: ^agents/.*\.py$
        additional_dependencies:
          - pydantic>=2
          - types-PyYAML
          - types-requests

  - repo: local
    hooks:
      - id: memory-boundary
        name: Memory boundary lint (item 5.11)
        entry: python scripts/check_memory_boundary.py
        language: system
        pass_filenames: false
        always_run: true
