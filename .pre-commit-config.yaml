repos:
  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
      - id: ruff-format

  - repo: local
    hooks:
      - id: memory-boundary
        name: Memory boundary lint (item 5.11)
        entry: python scripts/check_memory_boundary.py
        language: system
        pass_filenames: false
        always_run: true
