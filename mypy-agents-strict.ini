[mypy]
python_version = 3.12
ignore_missing_imports = True

[mypy-agents.*]
strict = True
warn_return_any = False
disallow_any_decorated = False

[mypy-spec.*]
follow_imports = silent
[mypy-db.*]
follow_imports = silent
[mypy-evaluation.*]
follow_imports = silent
[mypy-memory.*]
follow_imports = silent
[mypy-prompts.*]
follow_imports = silent
[mypy-system.*]
follow_imports = silent
[mypy-simulation.*]
follow_imports = silent
[mypy-optimization.*]
follow_imports = silent
[mypy-config.*]
follow_imports = silent
[mypy-knowledge.*]
follow_imports = silent
[mypy-api.*]
follow_imports = silent
[mypy-core.*]
follow_imports = silent
